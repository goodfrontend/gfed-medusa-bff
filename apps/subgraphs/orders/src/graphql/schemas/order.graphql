type Order @cacheControl(maxAge: 0) {
  id: ID!
  regionId: String!
  customerId: String!
  email: String!
  items: [LineItem!]!
  shippingMethods: [ShippingMethod!]!
  shippingAddress: Address
  paymentStatus: String!
  fulfillmentStatus: String!
  total: Int!
  status: String!
  createdAt: DateTime!
  currencyCode: String!
  displayId: Int
  paymentCollections: [PaymentCollection]
  subtotal: Int
  discountTotal: Int
  giftCardTotal: Int
  shippingTotal: Int
  taxTotal: Int
}

type OrderListResponse {
  orders: [Order!]!
  count: Int!
  limit: Int!
  offset: Int!
}

type OrderTransferData {
  id: ID!
  email: String!
}

type OrderTransferResult {
  success: Boolean!
  error: String
  order: OrderTransferData
}

extend type Query {
  order(id: ID!): Order
  orders(limit: Int, offset: Int): OrderListResponse
}

extend type Mutation {
  requestOrderTransfer(orderId: ID!): OrderTransferResult
  acceptOrderTransfer(orderId: ID!, token: String!): OrderTransferResult
  declineOrderTransfer(orderId: ID!, token: String!): OrderTransferResult
}
