enum PaymentStatus {
  not_paid
  awaiting
  authorized
  partially_authorized
  captured
  partially_captured
  refunded
  partially_refunded
  canceled
  requires_action
  completed
  not_started
  voided
}

type Payment {
  id: String!
  amount: Int!
  currencyCode: String!
  providerId: String!
  cardLast4: String
  data: JSON
  createdAt: DateTime
}

enum PaymentSessionStatus {
  authorized
  captured
  canceled
  pending
  requires_more
  error
}

type PaymentCollection {
  id: String!
  currencyCode: String!
  amount: Int!
  status: PaymentStatus!
  paymentProviders: [PaymentProviders]!
  paymentSessions: [PaymentSessions]
  payments: [Payment]
}

type PaymentProviders {
  id: String!
}

type PaymentSessions {
  id: String!
  amount: Int!
  currencyCode: String!
  providerId: String!
  data: JSON!
  status: PaymentSessionStatus!
}

extend type Query {
  paymentProviders(regionId: ID!): [PaymentProviders!]!
}
