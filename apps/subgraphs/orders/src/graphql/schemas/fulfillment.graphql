type ServiceZoneLocationAddress {
  city: String
  countryCode: String
  address1: String
  postalCode: String
}

type ServiceZoneLocation {
  address: ServiceZoneLocationAddress
}

type ServiceZone {
  fulfillmentSetType: String
  location: ServiceZoneLocation
}

type PriceRule {
  attribute: String!
  operator: String!
  value: String!
}

type ShippingOptionPrice {
  amount: Int
  currencyCode: String
  priceRules: [PriceRule]
}

type CalculatedShippingOptionPrice {
  amount: Int
}

type ShippingOption {
  id: ID!
  name: String!
  amount: Int
  priceType: String!
  serviceZoneId: String
  insufficientInventory: Boolean
  serviceZone: ServiceZone
  calculatedPrice: CalculatedShippingOptionPrice
  prices: [ShippingOptionPrice]
}

extend type Query {
  shippingOptions(cartId: ID!): [ShippingOption]
}

extend type Mutation {
  calculateShippingOptionPrice(optionId: ID!, cartId: ID!, data: JSON): ShippingOption
}
