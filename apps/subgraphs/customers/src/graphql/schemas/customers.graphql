type Query {
  me: Customer @cacheControl(maxAge: 0)
}

type Mutation {
  register(input: RegisterCustomerInput!): AuthPayload!
  login(input: LoginInput!): AuthPayload!
  logout: Boolean!
}

# New Input Types
input RegisterCustomerInput {
  email: String!
  password: String!
  firstName: String
  lastName: String
  phone: String
}

input LoginInput {
  email: String!
  password: String!
}

# Response Types
type AuthPayload {
  token: String!
  customer: Customer
}

type LoginResponse {
  token: String
  isCustomerLoggedIn: Boolean
}

type LogoutResponse {
  success: Boolean
}

type Customer @cacheControl(maxAge: 0) {
  id: String!
  email: String
  defaultBillingAddressId: String
  defaultShippingAddressId: String
  companyName: String
  firstName: String
  lastName: String
  addresses: [CustomerAddress]
  phone: String
}

type CustomerAddress {
  id: String!
  addressName: String
  isDefaultShipping: Boolean
  isDefaultBilling: Boolean
  customerId: String
  company: String
  firstName: String
  lastName: String
  address1: String
  address2: String
  city: String
  countryCode: String
  province: String
  postalCode: String
  phone: String
}
