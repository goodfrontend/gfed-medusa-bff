type Query {
  me: Customer @cacheControl(maxAge: 0)
}

type Mutation {
  register(input: RegisterCustomerInput!): AuthPayload!
  login(input: LoginInput!): AuthPayload!
  logout: Boolean!
  updateCustomer(input: UpdateCustomerInput!): Customer!
  addCustomerAddress(input: AddCustomerAddressInput!): Customer!
  updateCustomerAddress(id: ID!, input: UpdateCustomerAddressInput!): Customer!
  deleteCustomerAddress(id: ID!): DeleteCustomerAddressResult!
}

input UpdateCustomerInput {
  firstName: String
  lastName: String
  phone: String
}

input AddCustomerAddressInput {
  firstName: String
  lastName: String
  company: String
  address1: String
  address2: String
  city: String
  province: String
  countryCode: String
  postalCode: String
  phone: String
  isDefaultBilling: Boolean
  isDefaultShipping: Boolean
}

input UpdateCustomerAddressInput {
  firstName: String
  lastName: String
  company: String
  address1: String
  address2: String
  city: String
  province: String
  countryCode: String
  postalCode: String
  phone: String
}

type DeleteCustomerAddressResult {
  id: ID!
  deleted: Boolean!
}

input RegisterCustomerInput {
  email: String!
  password: String!
  firstName: String
  lastName: String
  phone: String
}

input LoginInput {
  email: String!
  password: String!
}

type AuthPayload {
  token: String!
  customer: Customer
}

type Customer {
  id: String!
  email: String
  defaultBillingAddressId: String
  defaultShippingAddressId: String
  companyName: String
  firstName: String
  lastName: String
  addresses: [CustomerAddress]
  phone: String
}

type CustomerAddress {
  id: String!
  addressName: String
  isDefaultShipping: Boolean
  isDefaultBilling: Boolean
  customerId: String
  company: String
  firstName: String
  lastName: String
  address1: String
  address2: String
  city: String
  countryCode: String
  province: String
  postalCode: String
  phone: String
}
