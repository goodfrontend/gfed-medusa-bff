type Query {
  products(
    limit: Int
    offset: Int
    order: String
    region_id: String
    handle: String
    category_id: [String]
    collection_id: [String]
    q: String
    id: [ID!]
    is_giftcard: Boolean
    tag_id: [String]
  ): ProductListResponse! @cacheControl(maxAge: 300, scope: PUBLIC)
  product(id: ID!, region_id: String): Product
    @cacheControl(maxAge: 300, scope: PUBLIC)
  productCategories(
    limit: Int
    offset: Int
    q: String
    handle: String
    is_active: Boolean
    is_internal: Boolean
    include_descendants_tree: Boolean
    parent_category_id: String
  ): [ProductCategory!]! @cacheControl(maxAge: 300, scope: PUBLIC)
  productCategory(id: ID!): ProductCategory
    @cacheControl(maxAge: 300, scope: PUBLIC)
  collections(limit: Int, offset: Int, handle: [String]): [Collection!]!
    @cacheControl(maxAge: 300, scope: PUBLIC)
  collection(id: ID!): Collection @cacheControl(maxAge: 300, scope: PUBLIC)
  searchProducts(
    query: String
    indexName: String
    hitsPerPage: Int
    page: Int
    filters: String
    facets: [String!]
  ): SearchProducts! @cacheControl(maxAge: 30, scope: PUBLIC)
  browseProducts(
    countryCode: String
    regionId: String
    sort: BrowseProductsSort = LATEST
    hitsPerPage: Int
    page: Int
    filters: String
    facets: [String!]
  ): BrowseProducts! @cacheControl(maxAge: 30, scope: PUBLIC)
}

type ProductListResponse {
  products: [Product] @cacheControl(maxAge: 300, scope: PUBLIC)
  count: Int!
}

type Product @key(fields: "id") @cacheControl(maxAge: 300, scope: PUBLIC) {
  id: ID!
  title: String!
  handle: String!
  description: String
  thumbnail: String
  width: Float
  weight: Float
  length: Float
  height: Float
  originCountry: String
  material: String
  images: [ProductImage!] @cacheControl(maxAge: 300, scope: PUBLIC)
  tags: [ProductTag!] @cacheControl(maxAge: 300, scope: PUBLIC)
  options: [ProductOption!] @cacheControl(maxAge: 300, scope: PUBLIC)
  variants: [ProductVariant!] @cacheControl(maxAge: 300, scope: PUBLIC)
  collection: Collection @cacheControl(maxAge: 300, scope: PUBLIC)
  type: String
  collectionId: String
  createdAt: DateTime!
}

type ProductImage {
  id: ID!
  url: String!
}

type ProductTag {
  id: ID!
}

type ProductOption {
  id: ID!
  title: String!
  values: [ProductOptionValue!]! @cacheControl(maxAge: 300, scope: PUBLIC)
}

type ProductOptionValue {
  id: ID!
  value: String!
}

type ProductVariant
  @key(fields: "id")
  @cacheControl(maxAge: 300, scope: PUBLIC) {
  id: ID!
  sku: String
  inventoryQuantity: Int @cacheControl(maxAge: 0)
  allowBackorder: Boolean
  manageInventory: Boolean
  options: [ProductVariantOption] @cacheControl(maxAge: 300, scope: PUBLIC)
  price: Price @cacheControl(maxAge: 0)
  originalPrice: Price @cacheControl(maxAge: 0)
  title: String
  product: Product @cacheControl(maxAge: 300, scope: PUBLIC)
}

type ProductVariantOption {
  id: ID!
  optionId: ID!
  value: String!
}

type Price @cacheControl(maxAge: 0, scope: PUBLIC) {
  amount: Float
  currencyCode: String
  priceType: String
}

type ProductCategory @cacheControl(maxAge: 600, scope: PUBLIC) {
  id: ID!
  name: String!
  description: String
  handle: String!
  parentCategory: ProductCategory @cacheControl(maxAge: 600, scope: PUBLIC)
  categoryChildren: [ProductCategory!] @cacheControl(maxAge: 600, scope: PUBLIC)
  products: ProductList @cacheControl(maxAge: 300, scope: PUBLIC)
}

type Collection @cacheControl(maxAge: 600, scope: PUBLIC) {
  id: ID!
  title: String!
  handle: String!
  products: ProductList @cacheControl(maxAge: 300, scope: PUBLIC)
}

type ProductList {
  count: Int!
  items: [Product!] @cacheControl(maxAge: 300, scope: PUBLIC)
}

type ProductHit {
  id: ID!
  title: String
  description: String
  handle: String!
  thumbnail: String
}

enum BrowseProductsSort {
  LATEST
  PRICE_ASC
  PRICE_DESC
}

type BrowseProductHit {
  id: ID!
  title: String
  description: String
  handle: String!
  thumbnail: String
  collectionId: String
  collectionHandle: String
  categoryIds: [String!]!
  categoryHandles: [String!]!
  isSellable: Boolean!
  priceAmount: Float
  originalPriceAmount: Float
  currencyCode: String
  displayPrice: String
  displayOriginalPrice: String
}

type SearchProducts {
  total: Int!
  page: Int!
  totalPages: Int!
  hitsPerPage: Int!
  query: String!
  params: String!
  items: [ProductHit!]! @cacheControl(maxAge: 30, scope: PUBLIC)
}

type BrowseProducts {
  total: Int!
  page: Int!
  totalPages: Int!
  hitsPerPage: Int!
  params: String!
  items: [BrowseProductHit!]! @cacheControl(maxAge: 30, scope: PUBLIC)
}
